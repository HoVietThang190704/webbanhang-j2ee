<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<body>
    <div th:fragment="bannerSlider">
        <!-- TGDD-style Banner Slider -->
        <div class="relative w-full overflow-hidden rounded-lg bg-white shadow-md" id="bannerSlider">
            <!-- Slider Container -->
            <div class="relative h-[200px] sm:h-[280px] md:h-[360px] lg:h-[400px]">
                <!-- Slide 1 -->
                <div class="banner-slide absolute inset-0 transition-opacity duration-700 opacity-100">
                    <img src="/images/banners/banner1.jpg" alt="Banner 1" class="w-full h-full object-cover" />
                </div>
                <!-- Slide 2 -->
                <div class="banner-slide absolute inset-0 transition-opacity duration-700 opacity-0">
                    <img src="/images/banners/banner2.jpg" alt="Banner 2" class="w-full h-full object-cover" />
                </div>
                <!-- Slide 3 -->
                <div class="banner-slide absolute inset-0 transition-opacity duration-700 opacity-0">
                    <img src="/images/banners/banner3.jpg" alt="Banner 3" class="w-full h-full object-cover" />
                </div>
            </div>

            <!-- Navigation Arrows -->
            <button type="button"
                class="absolute left-3 top-1/2 -translate-y-1/2 bg-white/80 hover:bg-white rounded-full p-2 shadow-lg transition z-10"
                onclick="previousSlide()">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-gray-700" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
                </svg>
            </button>
            <button type="button"
                class="absolute right-3 top-1/2 -translate-y-1/2 bg-white/80 hover:bg-white rounded-full p-2 shadow-lg transition z-10"
                onclick="nextSlide()">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-gray-700" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
                </svg>
            </button>

            <!-- Dots Indicator -->
            <div class="absolute bottom-3 left-1/2 -translate-x-1/2 flex gap-1.5 z-10">
                <button class="banner-dot w-6 h-1.5 rounded-full bg-white transition-all"
                    onclick="goToSlide(0)"></button>
                <button class="banner-dot w-2 h-1.5 rounded-full bg-white/50 transition-all"
                    onclick="goToSlide(1)"></button>
                <button class="banner-dot w-2 h-1.5 rounded-full bg-white/50 transition-all"
                    onclick="goToSlide(2)"></button>
            </div>
        </div>

        <script>
            let currentSlide = 0;
            const slides = document.querySelectorAll('.banner-slide');
            const dots = document.querySelectorAll('.banner-dot');
            const totalSlides = slides.length;

            function showSlide(index) {
                if (index >= totalSlides) currentSlide = 0;
                else if (index < 0) currentSlide = totalSlides - 1;
                else currentSlide = index;

                slides.forEach((slide, i) => {
                    slide.style.opacity = i === currentSlide ? '1' : '0';
                });

                dots.forEach((dot, i) => {
                    if (i === currentSlide) {
                        dot.classList.remove('bg-white/50', 'w-2');
                        dot.classList.add('bg-white', 'w-6');
                    } else {
                        dot.classList.remove('bg-white', 'w-6');
                        dot.classList.add('bg-white/50', 'w-2');
                    }
                });
            }

            function nextSlide() { showSlide(currentSlide + 1); }
            function previousSlide() { showSlide(currentSlide - 1); }
            function goToSlide(index) { showSlide(index); }

            setInterval(nextSlide, 5000);
        </script>
    </div>
</body>

</html>
