<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Đặt Hàng Thành Công</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        clifford: "#da373d",
                    },
                },
            },
        };
    </script>
</head>

<body>
    <div th:replace="~{fragments/header :: header}"></div>

    <section class="bg-[#f0f0f0] min-h-screen pt-[140px] pb-6 font-sans flex items-center justify-center">
        <div class="max-w-[500px] w-full bg-white rounded-lg shadow-sm p-8 text-center flex flex-col items-center">

            <svg xmlns="http://www.w3.org/2000/svg" class="h-24 w-24 text-green-500 mb-4" fill="none"
                viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round"
                    d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>

            <p class="text-[15px] text-gray-600 mb-2">Cảm ơn bạn đã mua sắm tại cửa hàng. Chúng tôi sẽ sớm liên hệ để
                xác nhận đơn hàng.</p>
            
            <div th:if="${earnedPoints}" class="bg-yellow-50 border border-yellow-200 rounded-lg p-4 mb-6 w-full animate-bounce">
                <span class="text-yellow-800 font-bold block text-[16px]">✨ Bạn đã tích lũy thêm:</span>
                <span class="text-2xl font-black text-yellow-600" th:text="${earnedPoints + ' điểm thưởng'}">200 điểm</span>
            </div>

            <a th:href="@{/products}"
                class="px-8 py-3 bg-[#cb1c22] text-white font-bold rounded-lg hover:bg-[#a6171c] transition uppercase text-[15px] w-full">Về
                Trang Chủ</a>
        </div>
    </section>
</body>

</html>
