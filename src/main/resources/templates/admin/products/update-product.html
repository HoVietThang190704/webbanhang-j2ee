<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout}">
<head>
    <title>Cập nhật sản phẩm</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root{--primary:#10b981;--primary-dark:#059669;--bg-main:#f1f5f9;
          --card-bg:#fff;--text-main:#1e293b;--text-muted:#64748b;
          --border:#e2e8f0;--shadow:0 4px 24px rgba(16,185,129,.08);}
        body{background:var(--bg-main);}
        .page-header{background:linear-gradient(135deg,#10b981 0%,#059669 50%,#047857 100%);
          border-radius:20px;padding:28px 36px;margin-bottom:28px;color:#fff;
          position:relative;overflow:hidden;box-shadow:0 8px 32px rgba(16,185,129,.3);}
        .page-header::before{content:'';position:absolute;top:-40px;right:-40px;
          width:180px;height:180px;background:rgba(255,255,255,.08);border-radius:50%;}
        .page-header h1{font-size:1.6rem;font-weight:700;margin:0 0 4px;}
        .page-header p{margin:0;opacity:.8;font-size:.875rem;}
        .id-banner{display:inline-flex;align-items:center;gap:6px;
          background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.3);
          border-radius:8px;padding:4px 12px;font-size:.78rem;font-weight:600;margin-top:8px;}
        .form-card{background:var(--card-bg);border-radius:20px;
          box-shadow:var(--shadow);border:1px solid var(--border);overflow:hidden;}
        .form-card-header{padding:20px 28px;border-bottom:1px solid var(--border);
          display:flex;align-items:center;gap:10px;}
        .icon-wrap{width:40px;height:40px;border-radius:10px;
          display:flex;align-items:center;justify-content:center;font-size:1rem;}
        .icon-wrap.green{background:#d1fae5;color:#10b981;}
        .form-card-header h2{font-size:1rem;font-weight:700;color:var(--text-main);margin:0;}
        .form-card-body{padding:28px;}
        .form-row{display:grid;gap:20px;margin-bottom:22px;}
        .form-row.cols-2{grid-template-columns:1fr 1fr;}
        @media(max-width:640px){.form-row.cols-2{grid-template-columns:1fr;}}
        .form-group{display:flex;flex-direction:column;gap:6px;}
        .form-group label{font-size:.82rem;font-weight:600;color:var(--text-main);
          display:flex;align-items:center;gap:6px;}
        .form-group label i{color:#6366f1;}
        .badge-opt{background:#f1f5f9;color:var(--text-muted);
          font-size:.68rem;padding:2px 7px;border-radius:5px;}
        .form-control,.form-select{border:1.5px solid var(--border);border-radius:10px;
          padding:10px 14px;font-size:.875rem;background:#f8fafc;
          color:var(--text-main);outline:none;
          transition:border-color .2s,box-shadow .2s,background .2s;}
        .form-control:focus,.form-select:focus{border-color:#10b981;
          box-shadow:0 0 0 3px rgba(16,185,129,.12);background:#fff;}
        .form-control.changed,.form-select.changed{border-color:#f59e0b;background:#fffbeb;}
        textarea.form-control{resize:vertical;min-height:110px;}
        .price-input-wrap{display:flex;border:1.5px solid var(--border);border-radius:10px;
          overflow:hidden;background:#f8fafc;transition:border-color .2s,box-shadow .2s;}
        .price-input-wrap:focus-within{border-color:#10b981;
          box-shadow:0 0 0 3px rgba(16,185,129,.12);background:#fff;}
        .price-input-wrap.changed{border-color:#f59e0b;background:#fffbeb;}
        .price-prefix{padding:10px 14px;background:#d1fae5;color:#10b981;
          font-weight:700;font-size:.9rem;border-right:1.5px solid var(--border);}
        .price-input-wrap input{flex:1;border:none;outline:none;padding:10px 14px;
          background:transparent;font-size:.875rem;color:var(--text-main);}
        .err{font-size:.78rem;color:#ef4444;display:flex;align-items:center;gap:4px;}
        .form-hint{font-size:.75rem;color:var(--text-muted);display:flex;align-items:center;gap:5px;}
        /* Image section */
        .current-img-card{background:#f8fafc;border:1.5px solid var(--border);
          border-radius:12px;padding:16px;display:flex;align-items:center;gap:14px;}
        .current-img-card img{width:80px;height:80px;object-fit:contain;
          border-radius:10px;border:1px solid var(--border);}
        .upload-zone{border:2px dashed var(--border);border-radius:12px;
          padding:24px;text-align:center;cursor:pointer;
          transition:border-color .2s,background .2s;background:#f8fafc;}
        .upload-zone:hover{border-color:#10b981;background:#f0fdf4;}
        .upload-zone input[type=file]{display:none;}
        .upload-zone i{font-size:2rem;color:var(--text-muted);margin-bottom:8px;}
        .upload-zone p{margin:0;font-size:.875rem;color:var(--text-muted);}
        .upload-zone span{color:#10b981;font-weight:600;cursor:pointer;}
        #newImgPreviewBox{margin-top:12px;display:none;text-align:center;}
        #newImgPreview{max-height:100px;border-radius:10px;border:1px solid var(--border);}
        .form-divider{border:none;border-top:1px solid var(--border);margin:24px 0;}
        .form-actions{padding:20px 28px;border-top:1px solid var(--border);
          display:flex;align-items:center;gap:12px;background:#f8fafc;}
        .btn-submit{background:linear-gradient(135deg,#10b981,#059669);
          color:#fff;border:none;border-radius:10px;padding:11px 28px;
          font-size:.875rem;font-weight:600;display:flex;align-items:center;gap:8px;
          cursor:pointer;box-shadow:0 4px 14px rgba(16,185,129,.35);
          transition:transform .15s,box-shadow .15s;}
        .btn-submit:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(16,185,129,.4);}
        .btn-cancel{background:var(--card-bg);color:var(--text-muted);
          border:1.5px solid var(--border);border-radius:10px;padding:10px 22px;
          font-size:.875rem;font-weight:500;text-decoration:none;
          display:flex;align-items:center;gap:6px;transition:background .15s,color .15s;}
        .btn-cancel:hover{background:#f1f5f9;color:var(--text-main);}
    </style>
</head>
<body>
<section layout:fragment="content">
<div class="p-4">

  <!-- Header -->
  <div class="page-header">
    <div style="position:relative;z-index:1">
      <h1><i class="fa-solid fa-pen-to-square me-2"></i>Cập nhật sản phẩm</h1>
      <p>Chỉnh sửa thông tin sản phẩm trong hệ thống</p>
      <div class="id-banner">
        <i class="fa-solid fa-hashtag"></i>ID: <span th:text="${product.id}">1</span>
        &nbsp;·&nbsp;
        <i class="fa-solid fa-cube"></i><span th:text="${product.name}">Sản phẩm</span>
      </div>
    </div>
  </div>

  <!-- Breadcrumb -->
  <nav style="margin-bottom:20px;font-size:.82rem;color:var(--text-muted)">
    <a th:href="@{/admin/products}" style="color:#6366f1;text-decoration:none">
      <i class="fa-solid fa-box-open me-1"></i>Sản phẩm
    </a>
    <i class="fa-solid fa-chevron-right mx-2" style="font-size:.65rem"></i>
    <span th:text="${product.name}">Cập nhật</span>
  </nav>

  <form th:action="@{/admin/products/update/{id}(id=${product.id})}"
        th:object="${product}" method="post" enctype="multipart/form-data" id="editForm">

    <div class="form-card">
      <div class="form-card-header">
        <div class="icon-wrap green"><i class="fa-solid fa-pen-to-square"></i></div>
        <div>
          <h2>Thông tin sản phẩm</h2>
          <p style="margin:0;font-size:.75rem;color:var(--text-muted)">Các trường có <span style="color:#ef4444">*</span> là bắt buộc</p>
        </div>
      </div>
      <div class="form-card-body">

        <!-- Name + Category -->
        <div class="form-row cols-2">
          <div class="form-group">
            <label for="name"><i class="fa-solid fa-cube"></i> Tên sản phẩm <span style="color:#ef4444">*</span></label>
            <input type="text" id="name" th:field="*{name}" class="form-control"
                   placeholder="Tên sản phẩm" required data-original=""/>
            <div class="err" th:if="${#fields.hasErrors('name')}">
              <i class="fa-solid fa-circle-exclamation"></i><span th:errors="*{name}"></span>
            </div>
          </div>
          <div class="form-group">
            <label for="category"><i class="fa-solid fa-layer-group"></i> Danh mục</label>
            <select th:field="*{category.id}" id="category" class="form-select" data-original="">
              <option value="">-- Chọn danh mục --</option>
              <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"
                      th:selected="${product.category != null and cat.id == product.category.id}">
              </option>
            </select>
          </div>
        </div>

        <!-- Price + Stock -->
        <div class="form-row cols-2">
          <div class="form-group">
            <label for="price"><i class="fa-solid fa-tag"></i> Giá bán <span style="color:#ef4444">*</span></label>
            <div class="price-input-wrap" id="priceWrap">
              <span class="price-prefix">₫</span>
              <input type="number" id="price" th:field="*{price}" step="1000" min="0" required
                     data-original=""/>
            </div>
          </div>
          <div class="form-group">
            <label for="stock"><i class="fa-solid fa-warehouse"></i> Tồn kho</label>
            <input type="number" id="stock" th:field="*{stock}" min="0" class="form-control" data-original=""/>
          </div>
        </div>

        <!-- Original Price + Promo Stock -->
        <div class="form-row cols-2">
          <div class="form-group">
            <label for="originalPrice"><i class="fa-solid fa-money-bill-wave"></i> Giá gốc</label>
            <div class="price-input-wrap">
              <span class="price-prefix">₫</span>
              <input type="number" id="originalPrice" th:field="*{originalPrice}" step="1000" min="0" data-original=""/>
            </div>
          </div>
          <div class="form-group">
            <label for="promotionStock"><i class="fa-solid fa-percent"></i> SL Khuyến mãi hiện tại</label>
            <input type="number" id="promotionStock" th:field="*{promotionStock}" min="0" class="form-control" data-original=""/>
          </div>
          <div class="form-group">
            <label for="startPromotionStock"><i class="fa-solid fa-list-ol"></i> Tổng suất Khuyến mãi ban đầu</label>
            <input type="number" id="startPromotionStock" th:field="*{startPromotionStock}" min="0" class="form-control" data-original=""/>
          </div>
        </div>

        <!-- Description -->
        <div class="form-group" style="margin-bottom:0">
          <label for="description"><i class="fa-solid fa-align-left"></i> Mô tả <span style="color:#ef4444">*</span></label>
          <textarea id="description" th:field="*{description}" class="form-control"
                    maxlength="2000" required data-original=""></textarea>
          <div class="err" th:if="${#fields.hasErrors('description')}">
            <i class="fa-solid fa-circle-exclamation"></i><span th:errors="*{description}"></span>
          </div>
        </div>

        <hr class="form-divider"/>

        <!-- Current image + Upload new -->
        <div class="form-group" style="margin-bottom:0">
          <label><i class="fa-solid fa-image"></i> Ảnh sản phẩm <span class="badge-opt">Tùy chọn</span></label>

          <!-- Current image -->
          <div th:if="${product.imagePath != null}" class="current-img-card" style="margin-bottom:12px">
            <img th:src="${product.imagePath}" alt="Ảnh hiện tại"
                 onerror="this.style.display='none'"/>
            <div>
              <div style="font-weight:600;font-size:.85rem;color:var(--text-main)">Ảnh hiện tại</div>
              <div style="font-size:.75rem;color:var(--text-muted);margin-top:2px">Tải ảnh mới để thay thế</div>
            </div>
          </div>

          <div class="upload-zone" onclick="document.getElementById('imageFile').click()">
            <input type="file" id="imageFile" name="imageFile" accept="image/*" onchange="previewImg(this)"/>
            <i class="fa-solid fa-cloud-arrow-up"></i>
            <p>Kéo thả ảnh mới hoặc <span>chọn file</span></p>
            <p style="font-size:.72rem;margin-top:4px">Để trống nếu muốn giữ ảnh cũ</p>
          </div>
          <div id="newImgPreviewBox">
            <img id="newImgPreview" src="" alt="Preview mới"/>
            <p style="font-size:.75rem;color:var(--text-muted);margin-top:4px" id="newImgName"></p>
          </div>
        </div>
      </div>

      <!-- Actions -->
      <div class="form-actions">
        <button type="submit" class="btn-submit">
          <i class="fa-solid fa-floppy-disk"></i> Lưu thay đổi
        </button>
        <a th:href="@{/admin/products}" class="btn-cancel">
          <i class="fa-solid fa-xmark"></i> Hủy
        </a>
      </div>
    </div>
  </form>

</div>
<script>
  // Track changed fields
  document.querySelectorAll('[data-original]').forEach(function(el) {
    el.dataset.original = el.value;
    el.addEventListener('input', function() {
      if (this.value !== this.dataset.original) this.classList.add('changed');
      else this.classList.remove('changed');
    });
    el.addEventListener('change', function() {
      if (this.value !== this.dataset.original) this.classList.add('changed');
      else this.classList.remove('changed');
    });
  });
  // Price wrap change indicator
  var priceInput = document.getElementById('price');
  if (priceInput) {
    var priceWrap = document.getElementById('priceWrap');
    priceInput.addEventListener('input', function() {
      if (this.value !== this.dataset.original) priceWrap.classList.add('changed');
      else priceWrap.classList.remove('changed');
    });
  }
  function previewImg(input) {
    if (!input.files || !input.files[0]) return;
    var file = input.files[0];
    var reader = new FileReader();
    reader.onload = function(e) {
      document.getElementById('newImgPreview').src = e.target.result;
      document.getElementById('newImgName').textContent = '📎 ' + file.name;
      document.getElementById('newImgPreviewBox').style.display = 'block';
    };
    reader.readAsDataURL(file);
  }
</script>
</section>
</body>
</html>
