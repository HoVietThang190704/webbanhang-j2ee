<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="~{layout}">
<head>
  <title>Quản lý Sản phẩm</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --primary:#6366f1; --primary-dark:#4f46e5;
      --bg-main:#f1f5f9; --card-bg:#fff;
      --text-main:#1e293b; --text-muted:#64748b;
      --border:#e2e8f0; --shadow:0 4px 24px rgba(99,102,241,.08);
    }
    body{background:var(--bg-main);}
    .page-header{
      background:linear-gradient(135deg,#6366f1 0%,#8b5cf6 50%,#a78bfa 100%);
      border-radius:20px;padding:28px 36px;margin-bottom:28px;color:#fff;
      position:relative;overflow:hidden;
      box-shadow:0 8px 32px rgba(99,102,241,.3);
    }
    .page-header::before{content:'';position:absolute;top:-40px;right:-40px;
      width:200px;height:200px;background:rgba(255,255,255,.08);border-radius:50%;}
    .page-header h1{font-size:1.75rem;font-weight:700;margin:0 0 4px;}
    .page-header p{margin:0;opacity:.8;font-size:.875rem;}
    .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:16px;margin-bottom:28px;}
    .stat-card{background:var(--card-bg);border-radius:16px;padding:18px 22px;
      box-shadow:var(--shadow);border:1px solid var(--border);
      display:flex;align-items:center;gap:14px;
      transition:transform .2s,box-shadow .2s;}
    .stat-card:hover{transform:translateY(-3px);box-shadow:0 8px 32px rgba(99,102,241,.15);}
    .stat-icon{width:46px;height:46px;border-radius:12px;
      display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0;}
    .stat-icon.purple{background:#ede9fe;color:#6366f1;}
    .stat-icon.blue{background:#dbeafe;color:#3b82f6;}
    .stat-icon.red{background:#fee2e2;color:#ef4444;}
    .stat-icon.green{background:#d1fae5;color:#10b981;}
    .stat-label{font-size:.72rem;color:var(--text-muted);font-weight:500;}
    .stat-value{font-size:1.4rem;font-weight:700;color:var(--text-main);line-height:1;}
    .toolbar{background:var(--card-bg);border-radius:16px;padding:14px 20px;
      margin-bottom:20px;box-shadow:var(--shadow);border:1px solid var(--border);
      display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
    .search-box{position:relative;flex:1;min-width:220px;max-width:380px;}
    .search-box i{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text-muted);}
    .search-box input{width:100%;padding:10px 14px 10px 40px;border:1.5px solid var(--border);
      border-radius:10px;font-size:.875rem;background:var(--bg-main);outline:none;
      transition:border-color .2s,box-shadow .2s;}
    .search-box input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(99,102,241,.12);}
    .btn-add{background:linear-gradient(135deg,var(--primary),var(--primary-dark));
      color:#fff;border:none;border-radius:10px;padding:10px 20px;
      font-size:.875rem;font-weight:600;display:flex;align-items:center;gap:8px;
      text-decoration:none;transition:transform .15s,box-shadow .15s;white-space:nowrap;
      box-shadow:0 4px 14px rgba(99,102,241,.35);}
    .btn-add:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(99,102,241,.4);color:#fff;}
    .table-card{background:var(--card-bg);border-radius:20px;
      box-shadow:var(--shadow);border:1px solid var(--border);overflow:hidden;}
    .table-card table{margin:0;}
    .table thead th{background:#f8fafc;color:var(--text-muted);font-size:.72rem;
      font-weight:700;text-transform:uppercase;letter-spacing:.6px;
      padding:14px 18px;border-bottom:2px solid var(--border);white-space:nowrap;}
    .table tbody td{padding:12px 18px;vertical-align:middle;
      border-bottom:1px solid #f1f5f9;font-size:.875rem;color:var(--text-main);}
    .table tbody tr{transition:background .15s;}
    .table tbody tr:hover{background:#f8faff;}
    .table tbody tr:last-child td{border-bottom:none;}
    .product-cell{display:flex;align-items:center;gap:10px;}
    .product-img{width:44px;height:44px;border-radius:10px;background:#f1f5f9;
      border:1px solid var(--border);display:flex;align-items:center;justify-content:center;
      overflow:hidden;flex-shrink:0;}
    .product-img img{width:38px;height:38px;object-fit:contain;}
    .product-name{font-weight:600;color:var(--text-main);}
    .product-promo{font-size:.72rem;color:var(--text-muted);}
    .badge-cat{display:inline-flex;align-items:center;gap:4px;
      background:#ede9fe;color:#6366f1;border-radius:6px;padding:3px 10px;
      font-size:.75rem;font-weight:600;}
    .badge-nocat{background:#f1f5f9;color:var(--text-muted);border-radius:6px;
      padding:3px 10px;font-size:.75rem;}
    .price-cell{font-weight:700;color:#e4002b;font-size:.9rem;}
    .stock-cell{font-weight:600;}
    .stock-low{color:#ef4444;}
    .stock-ok{color:#10b981;}
    .id-badge{background:#ede9fe;color:var(--primary);border-radius:8px;
      padding:3px 10px;font-weight:700;font-size:.8rem;}
    .action-group{display:flex;gap:7px;justify-content:center;}
    .btn-icon{width:34px;height:34px;border-radius:9px;border:none;
      display:flex;align-items:center;justify-content:center;font-size:.8rem;
      text-decoration:none;transition:transform .15s,box-shadow .15s;cursor:pointer;}
    .btn-icon:hover{transform:scale(1.1);}
    .btn-edit{background:#dbeafe;color:#3b82f6;}
    .btn-edit:hover{background:#3b82f6;color:#fff;box-shadow:0 4px 12px rgba(59,130,246,.3);}
    .btn-del{background:#fee2e2;color:#ef4444;}
    .btn-del:hover{background:#ef4444;color:#fff;box-shadow:0 4px 12px rgba(239,68,68,.3);}
    .empty-state{text-align:center;padding:64px 24px;color:var(--text-muted);}
    .empty-state i{font-size:3rem;margin-bottom:16px;opacity:.4;}
  </style>
</head>
<body>
<section layout:fragment="content">
<div class="p-4">

  <!-- Header -->
  <div class="page-header">
    <div style="position:relative;z-index:1">
      <h1><i class="fa-solid fa-box-open me-2"></i>Quản lý Sản phẩm</h1>
      <p>Toàn bộ sản phẩm trong hệ thống</p>
    </div>
  </div>

  <!-- Messages -->
  <div th:if="${message}" th:class="${'alert alert-' + messageType + ' alert-dismissible fade show'}" role="alert">
    <span th:text="${message}">Message goes here</span>
    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
  </div>

  <!-- Stats -->
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-icon purple"><i class="fa-solid fa-box-open"></i></div>
      <div>
        <div class="stat-label">Tổng sản phẩm</div>
        <div class="stat-value" th:text="${#lists.size(products)}">0</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon green"><i class="fa-solid fa-circle-check"></i></div>
      <div>
        <div class="stat-label">Còn hàng</div>
        <div class="stat-value" th:text="${#lists.size(products.?[stock > 0])}">0</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon red"><i class="fa-solid fa-triangle-exclamation"></i></div>
      <div>
        <div class="stat-label">Hết hàng</div>
        <div class="stat-value" th:text="${#lists.size(products.?[stock == 0])}">0</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon blue"><i class="fa-solid fa-layer-group"></i></div>
      <div>
        <div class="stat-label">Có danh mục</div>
        <div class="stat-value" th:text="${#lists.size(products.?[category != null])}">0</div>
      </div>
    </div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <div class="search-box">
      <i class="fa-solid fa-magnifying-glass"></i>
      <input id="searchInput" type="text" placeholder="Tìm kiếm sản phẩm..." oninput="filterTable(this.value)"/>
    </div>
    <a th:href="@{/admin/products/add}" class="btn-add">
      <i class="fa-solid fa-plus"></i> Thêm sản phẩm
    </a>
  </div>

  <!-- Table -->
  <div class="table-card">
    <table class="table" id="prodTable">
      <thead>
        <tr>
          <th style="width:60px">#</th>
          <th style="width:60px">Ảnh</th>
          <th>Tên sản phẩm</th>
          <th>Danh mục</th>
          <th style="text-align:right">Giá</th>
          <th style="text-align:center">Tồn kho</th>
          <th style="text-align:center;width:110px">Hành động</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="product,iterStat : ${products}">
          <td><span class="id-badge" th:text="${iterStat.index + 1}">1</span></td>
          <td>
            <div class="product-img">
              <img th:if="${product.imagePath != null}" th:src="${product.imagePath}" alt=""
                   onerror="this.parentElement.innerHTML='<i class=\'fa-solid fa-image\' style=\'color:#94a3b8\'></i>'"/>
              <img th:if="${product.imagePath == null and product.image != null}"
                   th:src="@{/images/{f}(f=${product.image})}" alt=""
                   onerror="this.parentElement.innerHTML='<i class=\'fa-solid fa-image\' style=\'color:#94a3b8\'></i>'"/>
              <i th:if="${product.imagePath == null and product.image == null}"
                 class="fa-solid fa-image" style="color:#94a3b8"></i>
            </div>
          </td>
          <td>
            <div class="product-cell">
              <div>
                <div class="product-name" th:text="${product.name}">Tên sản phẩm</div>
                <div class="product-promo" th:if="${product.promotion != null}" th:text="${product.promotion}"></div>
              </div>
            </div>
          </td>
          <td>
            <span th:if="${product.category != null}" class="badge-cat">
              <i class="fa-solid fa-tag" style="font-size:.65rem"></i>
              <span th:text="${product.category.name}">Category</span>
            </span>
            <span th:unless="${product.category != null}" class="badge-nocat">—</span>
          </td>
          <td style="text-align:right">
            <span class="price-cell"
              th:text="${product.price != null ? #numbers.formatDecimal(product.price,0,'POINT',0,'COMMA') + '₫' : '0₫'}">0₫</span>
          </td>
          <td style="text-align:center">
            <span th:classappend="${product.stock == 0 ? 'stock-low' : 'stock-ok'}"
                  class="stock-cell" th:text="${product.stock}">0</span>
          </td>
          <td>
            <div class="action-group">
              <a th:href="@{/admin/products/edit/{id}(id=${product.id})}"
                 class="btn-icon btn-edit" title="Sửa">
                <i class="fa-solid fa-pen-to-square"></i>
              </a>
              <a th:href="@{/admin/products/delete/{id}(id=${product.id})}"
                 class="btn-icon btn-del" title="Xóa"
                 onclick="return confirm('Bạn có chắc muốn xóa sản phẩm này không?')">
                <i class="fa-solid fa-trash"></i>
              </a>
            </div>
          </td>
        </tr>
        <tr th:if="${#lists.isEmpty(products)}">
          <td colspan="7">
            <div class="empty-state">
              <i class="fa-solid fa-box-open"></i>
              <p>Chưa có sản phẩm nào. <a th:href="@{/admin/products/add}">Thêm ngay</a></p>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

</div>
<script>
  function filterTable(q) {
    q = q.toLowerCase();
    document.querySelectorAll('#prodTable tbody tr').forEach(function(row) {
      var name = row.querySelector('.product-name');
      if (!name) return;
      row.style.display = name.textContent.toLowerCase().includes(q) ? '' : 'none';
    });
  }
</script>
</section>
</body>
</html>
