<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout}">
<head>
    <title>Thêm sản phẩm</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root{--primary:#6366f1;--primary-dark:#4f46e5;--bg-main:#f1f5f9;
          --card-bg:#fff;--text-main:#1e293b;--text-muted:#64748b;
          --border:#e2e8f0;--shadow:0 4px 24px rgba(99,102,241,.08);}
        body{background:var(--bg-main);}
        .page-header{background:linear-gradient(135deg,#6366f1 0%,#8b5cf6 50%,#a78bfa 100%);
          border-radius:20px;padding:28px 36px;margin-bottom:28px;color:#fff;
          position:relative;overflow:hidden;box-shadow:0 8px 32px rgba(99,102,241,.3);}
        .page-header::before{content:'';position:absolute;top:-40px;right:-40px;
          width:180px;height:180px;background:rgba(255,255,255,.08);border-radius:50%;}
        .page-header h1{font-size:1.6rem;font-weight:700;margin:0 0 4px;}
        .page-header p{margin:0;opacity:.8;font-size:.875rem;}
        .form-card{background:var(--card-bg);border-radius:20px;
          box-shadow:var(--shadow);border:1px solid var(--border);overflow:hidden;}
        .form-card-header{padding:20px 28px;border-bottom:1px solid var(--border);
          display:flex;align-items:center;gap:10px;}
        .icon-wrap{width:40px;height:40px;border-radius:10px;
          display:flex;align-items:center;justify-content:center;font-size:1rem;}
        .icon-wrap.purple{background:#ede9fe;color:#6366f1;}
        .form-card-header h2{font-size:1rem;font-weight:700;color:var(--text-main);margin:0;}
        .form-card-body{padding:28px;}
        .form-row{display:grid;gap:20px;margin-bottom:22px;}
        .form-row.cols-2{grid-template-columns:1fr 1fr;}
        @media(max-width:640px){.form-row.cols-2{grid-template-columns:1fr;}}
        .form-group{display:flex;flex-direction:column;gap:6px;}
        .form-group label{font-size:.82rem;font-weight:600;color:var(--text-main);
          display:flex;align-items:center;gap:6px;}
        .form-group label i{color:var(--primary);}
        .badge-opt{background:#f1f5f9;color:var(--text-muted);
          font-size:.68rem;padding:2px 7px;border-radius:5px;}
        .form-control,.form-select{border:1.5px solid var(--border);border-radius:10px;
          padding:10px 14px;font-size:.875rem;background:#f8fafc;
          color:var(--text-main);outline:none;
          transition:border-color .2s,box-shadow .2s,background .2s;}
        .form-control:focus,.form-select:focus{border-color:var(--primary);
          box-shadow:0 0 0 3px rgba(99,102,241,.12);background:#fff;}
        textarea.form-control{resize:vertical;min-height:110px;}
        .price-input-wrap{display:flex;border:1.5px solid var(--border);border-radius:10px;
          overflow:hidden;background:#f8fafc;transition:border-color .2s,box-shadow .2s;}
        .price-input-wrap:focus-within{border-color:var(--primary);
          box-shadow:0 0 0 3px rgba(99,102,241,.12);background:#fff;}
        .price-prefix{padding:10px 14px;background:#ede9fe;color:var(--primary);
          font-weight:700;font-size:.9rem;border-right:1.5px solid var(--border);}
        .price-input-wrap input{flex:1;border:none;outline:none;padding:10px 14px;
          background:transparent;font-size:.875rem;color:var(--text-main);}
        .form-hint{font-size:.75rem;color:var(--text-muted);
          display:flex;align-items:center;gap:5px;}
        .err{font-size:.78rem;color:#ef4444;display:flex;align-items:center;gap:4px;}
        /* Image upload drop zone */
        .upload-zone{border:2px dashed var(--border);border-radius:12px;
          padding:28px;text-align:center;cursor:pointer;
          transition:border-color .2s,background .2s;background:#f8fafc;}
        .upload-zone:hover{border-color:var(--primary);background:#f5f3ff;}
        .upload-zone input[type=file]{display:none;}
        .upload-zone i{font-size:2.5rem;color:var(--text-muted);margin-bottom:10px;}
        .upload-zone p{margin:0;font-size:.875rem;color:var(--text-muted);}
        .upload-zone span{color:var(--primary);font-weight:600;cursor:pointer;}
        #imgPreviewBox{margin-top:14px;display:none;text-align:center;}
        #imgPreviewBox img{max-height:120px;border-radius:10px;border:1px solid var(--border);}
        .form-divider{border:none;border-top:1px solid var(--border);margin:24px 0;}
        .form-actions{padding:20px 28px;border-top:1px solid var(--border);
          display:flex;align-items:center;gap:12px;background:#f8fafc;}
        .btn-submit{background:linear-gradient(135deg,var(--primary),var(--primary-dark));
          color:#fff;border:none;border-radius:10px;padding:11px 28px;
          font-size:.875rem;font-weight:600;display:flex;align-items:center;gap:8px;
          cursor:pointer;box-shadow:0 4px 14px rgba(99,102,241,.35);
          transition:transform .15s,box-shadow .15s;}
        .btn-submit:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(99,102,241,.4);}
        .btn-cancel{background:var(--card-bg);color:var(--text-muted);
          border:1.5px solid var(--border);border-radius:10px;padding:10px 22px;
          font-size:.875rem;font-weight:500;text-decoration:none;
          display:flex;align-items:center;gap:6px;transition:background .15s,color .15s;}
        .btn-cancel:hover{background:#f1f5f9;color:var(--text-main);}
    </style>
</head>
<body>
<section layout:fragment="content">
<div class="p-4">

  <!-- Header -->
  <div class="page-header">
    <div style="position:relative;z-index:1">
      <h1><i class="fa-solid fa-circle-plus me-2"></i>Thêm sản phẩm mới</h1>
      <p>Điền thông tin để thêm sản phẩm vào hệ thống bán hàng</p>
    </div>
  </div>

  <!-- Breadcrumb -->
  <nav style="margin-bottom:20px;font-size:.82rem;color:var(--text-muted)">
    <a th:href="@{/admin/products}" style="color:#6366f1;text-decoration:none">
      <i class="fa-solid fa-box-open me-1"></i>Sản phẩm
    </a>
    <i class="fa-solid fa-chevron-right mx-2" style="font-size:.65rem"></i>
    <span>Thêm mới</span>
  </nav>

  <form th:action="@{/admin/products/add}" th:object="${product}" method="post" enctype="multipart/form-data">
    <div class="form-card">
      <div class="form-card-header">
        <div class="icon-wrap purple"><i class="fa-solid fa-cube"></i></div>
        <div>
          <h2>Thông tin cơ bản</h2>
          <p style="margin:0;font-size:.75rem;color:var(--text-muted)">Các trường có <span style="color:#ef4444">*</span> là bắt buộc</p>
        </div>
      </div>
      <div class="form-card-body">

        <!-- Name + Category -->
        <div class="form-row cols-2">
          <div class="form-group">
            <label for="name"><i class="fa-solid fa-cube"></i> Tên sản phẩm <span style="color:#ef4444">*</span></label>
            <input type="text" id="name" th:field="*{name}" class="form-control"
                   placeholder="Nhập tên sản phẩm..." required/>
            <div class="err" th:if="${#fields.hasErrors('name')}">
              <i class="fa-solid fa-circle-exclamation"></i><span th:errors="*{name}"></span>
            </div>
          </div>
          <div class="form-group">
            <label for="category"><i class="fa-solid fa-layer-group"></i> Danh mục <span style="color:#ef4444">*</span></label>
            <select th:field="*{category.id}" id="category" class="form-select">
              <option value="">-- Chọn danh mục --</option>
              <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"></option>
            </select>
          </div>
        </div>

        <!-- Price + Stock -->
        <div class="form-row cols-2">
          <div class="form-group">
            <label for="price"><i class="fa-solid fa-tag"></i> Giá bán <span style="color:#ef4444">*</span></label>
            <div class="price-input-wrap">
              <span class="price-prefix">₫</span>
              <input type="number" id="price" th:field="*{price}" step="1000" min="0" placeholder="0" required/>
            </div>
          </div>
          <div class="form-group">
            <label for="stock"><i class="fa-solid fa-warehouse"></i> Tồn kho <span style="color:#ef4444">*</span></label>
            <input type="number" id="stock" th:field="*{stock}" min="0" placeholder="0" class="form-control"/>
          </div>
        </div>

        <!-- Original Price + Promo Stock -->
        <div class="form-row cols-2">
          <div class="form-group">
            <label for="originalPrice"><i class="fa-solid fa-money-bill-wave"></i> Giá gốc</label>
            <div class="price-input-wrap">
              <span class="price-prefix">₫</span>
              <input type="number" id="originalPrice" th:field="*{originalPrice}" step="1000" min="0" placeholder="0"/>
            </div>
          </div>
          <div class="form-group">
            <label for="promotionStock"><i class="fa-solid fa-percent"></i> SL Khuyến mãi hiện tại</label>
            <input type="number" id="promotionStock" th:field="*{promotionStock}" min="0" placeholder="0" class="form-control"/>
          </div>
          <div class="form-group">
            <label for="startPromotionStock"><i class="fa-solid fa-list-ol"></i> Tổng suất Khuyến mãi ban đầu</label>
            <input type="number" id="startPromotionStock" th:field="*{startPromotionStock}" min="0" placeholder="0" class="form-control"/>
          </div>
        </div>

        <!-- Description -->
        <div class="form-group" style="margin-bottom:0">
          <label for="description"><i class="fa-solid fa-align-left"></i> Mô tả <span style="color:#ef4444">*</span></label>
          <textarea id="description" th:field="*{description}" class="form-control"
                    maxlength="2000" placeholder="Mô tả chi tiết sản phẩm, tính năng, ưu điểm..." required></textarea>
          <div class="err" th:if="${#fields.hasErrors('description')}">
            <i class="fa-solid fa-circle-exclamation"></i><span th:errors="*{description}"></span>
          </div>
        </div>

        <hr class="form-divider"/>

        <!-- Image Upload -->
        <div class="form-group" style="margin-bottom:0">
          <label><i class="fa-solid fa-image"></i> Ảnh sản phẩm <span class="badge-opt">Tùy chọn</span></label>
          <div class="upload-zone" onclick="document.getElementById('imageFile').click()">
            <input type="file" id="imageFile" name="imageFile" accept="image/*" onchange="previewImg(this)"/>
            <i class="fa-solid fa-cloud-arrow-up"></i>
            <p>Kéo thả ảnh vào đây hoặc <span>chọn file</span></p>
            <p style="font-size:.72rem;margin-top:4px">PNG, JPG, WEBP — Tối đa 5MB</p>
          </div>
          <div id="imgPreviewBox">
            <img id="imgPreview" src="" alt="Preview"/>
            <p style="font-size:.75rem;color:var(--text-muted);margin-top:6px" id="imgName"></p>
          </div>
        </div>
      </div>

      <!-- Actions -->
      <div class="form-actions">
        <button type="submit" class="btn-submit">
          <i class="fa-solid fa-floppy-disk"></i> Lưu sản phẩm
        </button>
        <a th:href="@{/admin/products}" class="btn-cancel">
          <i class="fa-solid fa-xmark"></i> Hủy
        </a>
      </div>
    </div>
  </form>

</div>
<script>
  function previewImg(input) {
    if (!input.files || !input.files[0]) return;
    var file = input.files[0];
    var reader = new FileReader();
    reader.onload = function(e) {
      document.getElementById('imgPreview').src = e.target.result;
      document.getElementById('imgName').textContent = file.name;
      document.getElementById('imgPreviewBox').style.display = 'block';
    };
    reader.readAsDataURL(file);
  }
</script>
</section>
</body>
</html>
