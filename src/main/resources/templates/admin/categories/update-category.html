<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout}">

<head>
    <title>Cập nhật danh mục</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --success: #10b981;
            --bg-main: #f1f5f9;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --shadow: 0 4px 24px rgba(99,102,241,0.08);
        }
        body { background: var(--bg-main); }

        .page-header {
            background: linear-gradient(135deg, #10b981 0%, #059669 50%, #047857 100%);
            border-radius: 20px;
            padding: 28px 36px;
            margin-bottom: 28px;
            color: #fff;
            position: relative;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(16,185,129,0.3);
        }
        .page-header::before {
            content: ''; position: absolute;
            top: -40px; right: -40px;
            width: 180px; height: 180px;
            background: rgba(255,255,255,0.08); border-radius: 50%;
        }
        .page-header h1 { font-size: 1.6rem; font-weight: 700; margin: 0 0 4px; }
        .page-header p  { margin: 0; opacity: .8; font-size: .875rem; }

        /* ID badge in header */
        .id-banner {
            display: inline-flex; align-items: center; gap: 6px;
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 8px; padding: 4px 12px;
            font-size: 0.78rem; font-weight: 600; margin-top: 8px;
        }

        .form-card {
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            overflow: hidden;
        }
        .form-card-header {
            padding: 20px 28px;
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; gap: 10px;
        }
        .form-card-header .icon-wrap {
            width: 40px; height: 40px;
            background: #d1fae5; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            color: #10b981; font-size: 1rem;
        }
        .form-card-header h2 { font-size: 1rem; font-weight: 700; color: var(--text-main); margin: 0; }
        .form-card-body { padding: 28px; }

        .form-group { margin-bottom: 22px; }
        .form-group label {
            display: flex; align-items: center; gap: 6px;
            font-size: 0.82rem; font-weight: 600;
            color: var(--text-main); margin-bottom: 8px;
        }
        .form-group label i { color: var(--primary); }
        .badge-opt {
            background: #f1f5f9; color: var(--text-muted);
            font-size: 0.68rem; padding: 2px 7px; border-radius: 5px;
        }
        .form-control, .form-select {
            border: 1.5px solid var(--border);
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 0.875rem;
            background: #f8fafc;
            color: var(--text-main);
            transition: border-color .2s, box-shadow .2s, background .2s;
            outline: none;
        }
        .form-control:focus, .form-select:focus {
            border-color: #10b981;
            box-shadow: 0 0 0 3px rgba(16,185,129,0.12);
            background: #fff;
        }
        .form-hint {
            font-size: 0.75rem; color: var(--text-muted);
            margin-top: 5px; display: flex; align-items: center; gap: 5px;
        }
        .text-danger-field {
            font-size: 0.78rem; color: #ef4444;
            margin-top: 5px; display: flex; align-items: center; gap: 4px;
        }
        .icon-preview-wrap {
            margin-top: 10px;
            display: flex; align-items: center; gap: 10px;
        }
        .icon-preview {
            width: 48px; height: 48px;
            border-radius: 12px;
            background: #f1f5f9; border: 1.5px solid var(--border);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem; color: var(--text-muted);
            overflow: hidden;
        }
        .icon-preview img { width: 36px; height: 36px; object-fit: contain; }
        .form-divider { border: none; border-top: 1px solid var(--border); margin: 24px 0; }

        .form-actions {
            padding: 20px 28px;
            border-top: 1px solid var(--border);
            display: flex; align-items: center; gap: 12px;
            background: #f8fafc;
        }
        .btn-submit {
            background: linear-gradient(135deg, #10b981, #059669);
            color: #fff; border: none;
            border-radius: 10px;
            padding: 11px 28px;
            font-size: 0.875rem; font-weight: 600;
            display: flex; align-items: center; gap: 8px;
            cursor: pointer;
            box-shadow: 0 4px 14px rgba(16,185,129,0.35);
            transition: transform .15s, box-shadow .15s;
        }
        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(16,185,129,0.4); }
        .btn-cancel {
            background: var(--card-bg); color: var(--text-muted);
            border: 1.5px solid var(--border);
            border-radius: 10px; padding: 10px 22px;
            font-size: 0.875rem; font-weight: 500;
            text-decoration: none;
            display: flex; align-items: center; gap: 6px;
            transition: background .15s, color .15s;
        }
        .btn-cancel:hover { background: #f1f5f9; color: var(--text-main); }

        /* Change indicator */
        .form-control.changed, .form-select.changed {
            border-color: #f59e0b;
            background: #fffbeb;
        }
    </style>
</head>

<body>
<section layout:fragment="content">
<div class="p-4">

    <!-- Header -->
    <div class="page-header">
        <div style="position:relative;z-index:1">
            <h1><i class="fa-solid fa-pen-to-square me-2"></i>Cập nhật danh mục</h1>
            <p>Chỉnh sửa thông tin danh mục trong hệ thống</p>
            <div class="id-banner">
                <i class="fa-solid fa-hashtag"></i>
                ID: <span th:text="${category.id}">1</span>
                &nbsp;·&nbsp;
                <i class="fa-solid fa-folder"></i>
                <span th:text="${category.name}">Tên danh mục</span>
            </div>
        </div>
    </div>

    <!-- Breadcrumb -->
    <nav style="margin-bottom:20px;font-size:0.82rem;color:var(--text-muted)">
        <a th:href="@{/admin/categories}" style="color:#6366f1;text-decoration:none">
            <i class="fa-solid fa-layer-group me-1"></i>Danh mục
        </a>
        <i class="fa-solid fa-chevron-right mx-2" style="font-size:.65rem"></i>
        <span th:text="${category.name}">Cập nhật</span>
    </nav>

    <!-- Form card -->
    <div class="form-card">
        <div class="form-card-header">
            <div class="icon-wrap"><i class="fa-solid fa-pen-to-square"></i></div>
            <div>
                <h2>Chỉnh sửa thông tin</h2>
                <p style="margin:0;font-size:.75rem;color:var(--text-muted)">Các trường có <span style="color:#ef4444">*</span> là bắt buộc</p>
            </div>
        </div>

        <form th:action="@{/admin/categories/update/{id}(id=${category.id})}"
              th:object="${category}" method="post" id="updateForm">
            <div class="form-card-body">

                <!-- Name -->
                <div class="form-group">
                    <label for="name">
                        <i class="fa-solid fa-tag"></i> Tên danh mục <span style="color:#ef4444">*</span>
                    </label>
                    <input type="text" id="name" th:field="*{name}" class="form-control"
                           placeholder="Tên danh mục" required data-original="" />
                    <div class="text-danger-field" th:if="${#fields.hasErrors('name')}">
                        <i class="fa-solid fa-circle-exclamation"></i>
                        <span th:errors="*{name}"></span>
                    </div>
                </div>

                <!-- Slug -->
                <div class="form-group">
                    <label for="slug">
                        <i class="fa-solid fa-link"></i> Slug
                        <span class="badge-opt">Tùy chọn</span>
                    </label>
                    <input type="text" id="slug" th:field="*{slug}" class="form-control"
                           placeholder="vd: laptop, dien-thoai" data-original="" />
                    <div class="form-hint">
                        <i class="fa-solid fa-circle-info"></i>
                        Nếu để trống, hệ thống sẽ tự tạo slug từ tên.
                    </div>
                </div>

                <hr class="form-divider"/>

                <!-- Icon URL -->
                <div class="form-group">
                    <label for="icon">
                        <i class="fa-solid fa-image"></i> Icon URL
                        <span class="badge-opt">Tùy chọn</span>
                    </label>
                    <input type="text" id="icon" th:field="*{icon}" class="form-control"
                           placeholder="Ví dụ: https://... hoặc /images/categoryicons/laptop.png"
                           oninput="previewIcon(this.value)" data-original="" />
                    <div class="icon-preview-wrap">
                        <div class="icon-preview" id="iconPreview">
                            <i class="fa-solid fa-image"></i>
                        </div>
                        <span style="font-size:.75rem;color:var(--text-muted)">Xem trước icon</span>
                    </div>
                </div>

                <hr class="form-divider"/>

                <!-- Parent Category -->
                <div class="form-group" style="margin-bottom:0">
                    <label for="parent">
                        <i class="fa-solid fa-sitemap"></i> Danh mục cha
                        <span class="badge-opt">Tùy chọn</span>
                    </label>
                    <select id="parent" name="parentId" class="form-select" data-original="">
                        <option value="">-- Không có (Root category) --</option>
                        <option th:each="p : ${parents}"
                                th:value="${p.id}"
                                th:text="${p.name}"
                                th:selected="${category.parent != null and p.id == category.parent.id}">
                        </option>
                    </select>
                    <div class="form-hint">
                        <i class="fa-solid fa-circle-info"></i>
                        Chọn một danh mục cha để tạo cấu trúc phân cấp.
                    </div>
                </div>
            </div>

            <!-- Actions -->
            <div class="form-actions">
                <button type="submit" class="btn-submit">
                    <i class="fa-solid fa-floppy-disk"></i> Lưu thay đổi
                </button>
                <a th:href="@{/admin/categories}" class="btn-cancel">
                    <i class="fa-solid fa-xmark"></i> Hủy
                </a>
            </div>
        </form>
    </div>

</div>

<script>
    // Track changed fields
    document.querySelectorAll('[data-original]').forEach(function(el) {
        el.dataset.original = el.value;
        el.addEventListener('input', function() {
            if (this.value !== this.dataset.original) this.classList.add('changed');
            else this.classList.remove('changed');
        });
        el.addEventListener('change', function() {
            if (this.value !== this.dataset.original) this.classList.add('changed');
            else this.classList.remove('changed');
        });
    });

    // Icon preview — load current value on page load
    function previewIcon(src) {
        var box = document.getElementById('iconPreview');
        if (!src || src.trim() === '') {
            box.innerHTML = '<i class="fa-solid fa-image"></i>'; return;
        }
        box.innerHTML = '<img src="' + src + '" onerror="this.parentElement.innerHTML=\'<i class=\\\'fa-solid fa-triangle-exclamation\\\' style=\\\'color:#ef4444\\\'></i>\'" />';
    }
    // Auto-preview on load
    var iconInput = document.getElementById('icon');
    if (iconInput && iconInput.value) previewIcon(iconInput.value);
</script>
</section>
</body>
</html>
