<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DemoShop – Điện thoại, Laptop, Phụ kiện chính hãng</title>
    <meta name="description" content="Mua sắm điện thoại, laptop, phụ kiện chính hãng với giá tốt nhất." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        tgddYellow: '#FFD400',
                        tgddRed: '#e4002b',
                        tgddBlue: '#288ad6',
                        tgddDark: '#1d2939',
                    },
                    fontFamily: {
                        sans: ['Inter', 'Arial', 'sans-serif'],
                    },
                },
            },
        };
    </script>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            background: #f5f5f5;
            font-family: 'Inter', Arial, sans-serif;
        }

        .no-underline {
            text-decoration: none !important;
        }

        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }

        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
    </style>
</head>

<body class="bg-[#f5f5f5] min-h-screen text-[#333] font-sans">

    <!-- Header -->
    <div th:replace="~{fragments/header :: header}"></div>

    <!-- Spacer: promo-bar(32) + logo-row(60) + main-menu(44) = ~140px -->
    <div class="h-[140px]"></div>

    <!-- ===== MAIN CONTENT ===== -->
    <main class="max-w-[1200px] mx-auto px-4 py-5 space-y-8">

        <!-- Banner Slider -->
        <section>
            <div th:replace="~{fragments/banner-slider :: bannerSlider}"></div>
        </section>

        <!-- Promotion Section (Flash Sale TGDD style) -->
        <section th:if="${promoProducts != null and !promoProducts.isEmpty()}">
            <div th:replace="~{fragments/promotion-section :: promotionSection(${promoProducts})}"></div>
        </section>

        <!-- Quick Category Icons -->
        <section class="bg-white rounded-xl p-4 shadow-sm">
            <div class="flex items-center gap-2 mb-4">
                <div class="w-1 h-5 bg-[#e4002b] rounded-full"></div>
                <h2 class="text-[15px] font-bold text-[#1d2939]">Khuyến mãi online</h2>
            </div>
            <div class="flex gap-2 overflow-x-auto scrollbar-hide pb-1">
                <!-- Flash Sale tab -->
                <a th:href="@{/products}"
                    class="flex-shrink-0 flex flex-col items-center gap-1 px-4 py-2.5 rounded-xl bg-[#e4002b] text-white text-[12px] font-bold min-w-[80px] no-underline hover:opacity-90 transition">
                    <span class="text-lg">⚡</span>
                    <span>Flash Sale</span>
                </a>

                <!-- Dynamic category tabs -->
                <a th:each="cat : ${categories}" th:href="@{/products(categoryId=${cat.id})}"
                    class="flex-shrink-0 flex flex-col items-center gap-1 px-4 py-2.5 rounded-xl bg-[#f5f5f5] hover:bg-[#e3f1fe] text-[12px] text-[#333] min-w-[80px] no-underline transition border border-gray-200 hover:border-[#288ad6] hover:text-[#288ad6]">
                    <span class="text-lg">📦</span>
                    <span th:text="${cat.name}" class="text-center leading-tight"></span>
                </a>
            </div>
        </section>

        <!-- Product Grid Section -->
        <section class="bg-white rounded-xl p-4 shadow-sm">
            <div th:replace="~{fragments/product-grid :: productGrid(${products})}"></div>
        </section>

        <!-- Empty state -->
        <div th:if="${products == null or #lists.isEmpty(products)}"
            class="bg-white rounded-xl p-12 text-center shadow-sm">
            <div class="text-gray-300 text-6xl mb-4">🛒</div>
            <h3 class="text-lg font-bold text-gray-500 mb-2">Chưa có sản phẩm nào</h3>
            <p class="text-gray-400 text-sm mb-4">Hãy thêm sản phẩm vào hệ thống để bắt đầu bán hàng.</p>
            <a th:href="@{/products/add}"
                class="inline-block bg-[#288ad6] text-white px-6 py-2.5 rounded-full text-sm font-semibold hover:bg-[#1a73c0] transition no-underline">
                + Thêm sản phẩm đầu tiên
            </a>
        </div>

    </main>

    <!-- Footer -->
    <div th:replace="~{fragments/footer :: footer}"></div>

    <!-- Scripts -->
    <script th:src="@{/js/product-grid.js}"></script>

</body>

</html>
