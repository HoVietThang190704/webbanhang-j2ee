<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - DemoShop</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: '#e4002b',
                        brandHover: '#cb1c22',
                    },
                    fontFamily: {
                        sans: ['Inter', 'Arial', 'sans-serif'],
                    },
                },
            },
        };
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="bg-gray-50 text-gray-800 min-h-screen flex flex-col">

    <!-- Header (Optional) -->
    <div th:replace="~{fragments/header :: header}"></div>

    <!-- Spacer for header -->
    <div class="h-[140px]"></div>

    <div class="flex-grow flex items-center justify-center p-4 my-8">
        <div class="w-full max-w-md bg-white rounded-2xl shadow-lg border border-gray-100 p-8">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-bold text-gray-900">Sign Up</h1>
                <p class="text-sm text-gray-500 mt-2">Tạo tài khoản DemoShop mới</p>
            </div>

            <form th:action="@{/register}" method="post" class="space-y-4">
                <!-- Errors -->
                <div th:if="${errors}" class="p-4 bg-red-50 rounded-lg border border-red-100">
                    <ul class="list-disc pl-5 space-y-1">
                        <li th:each="error : ${errors}" th:text="${error}" class="text-red-600 text-sm"></li>
                    </ul>
                </div>

                <!-- Fields -->
                <div>
                    <label for="username" class="block text-sm font-medium text-gray-700 mb-1">Tên đăng nhập</label>
                    <input type="text" id="username" name="username" required
                        class="w-full h-11 px-4 text-sm border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-brand focus:border-transparent transition-shadow"
                        placeholder="Nhập tên đăng nhập (viết liền không dấu)">
                </div>

                <div>
                    <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Địa chỉ Email</label>
                    <input type="email" id="email" name="email" required
                        class="w-full h-11 px-4 text-sm border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-brand focus:border-transparent transition-shadow"
                        placeholder="Ví dụ: email@gmail.com">
                </div>

                <div>
                    <label for="phone" class="block text-sm font-medium text-gray-700 mb-1">Số điện thoại</label>
                    <input type="tel" id="phone" name="phone" required
                        class="w-full h-11 px-4 text-sm border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-brand focus:border-transparent transition-shadow"
                        placeholder="Nhập số điện thoại của bạn">
                </div>

                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Mật khẩu</label>
                    <input type="password" id="password" name="password" required
                        class="w-full h-11 px-4 text-sm border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-brand focus:border-transparent transition-shadow"
                        placeholder="Tạo mật khẩu (ít nhất 6 ký tự)">
                </div>

                <div class="pt-2">
                    <button type="submit"
                        class="w-full h-12 bg-brand text-white font-bold rounded-lg hover:bg-brandHover transition-colors uppercase text-sm tracking-wide shadow-md hover:shadow-lg">
                        Đăng ký tài khoản
                    </button>
                </div>
            </form>

            <div class="mt-8 text-center text-sm text-gray-600">
                Bạn đã có tài khoản?
                <a th:href="@{/login}" class="font-semibold text-brand hover:underline ml-1">Đăng nhập tại đây</a>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <div th:replace="~{fragments/footer :: footer}"></div>

</body>

</html>
